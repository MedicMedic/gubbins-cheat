<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fill-in-the-Blanks Word Finder</title>
    <script src="https://cdn.tailwindcss.com" defer></script>
    <!-- Preconnect to font hosts to speed font loading -->
    <link rel="preconnect" href="https://fonts.cdnfonts.com">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/banana-grotesk" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Coming+Soon&display=swap" rel="stylesheet">
    <style>
        /* Use Coming Soon for most UI text; exclude letter boxes and results. Defer large background images for performance */
        body { font-family: 'Coming Soon', cursive; background-color: transparent !important; text-transform: uppercase !important; }
        /* Letter boxes: fluid grid — all boxes in one row */
        #letterBoxes {
            display: grid;
            gap: 0;
            width: 100%;
            max-width: 560px;
            margin: 0 auto;
        }
        .letter-box {
            width: 100%;
            aspect-ratio: 1;
            font-family: 'Banana Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;
            border: 2px solid #000000;
            border-radius: 0;
            background-color: #e6e2d6;
            cursor: pointer;
            transition: all 0.12s;
            font-size: clamp(0.45rem, 2.2vw, 2rem);
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .letter-box:hover  { border-color: #000000; transform: scale(1.01); }
        .letter-box.active { outline: 2px solid rgba(0,0,0,0.08); }
        .letter-box.filled { color: #000000; }

        /* Filled color cycle (in order, then loop) */
        .fill-color-0 { background-color: #e9bba4; }
        .fill-color-1 { background-color: #e7b465; }
        .fill-color-2 { background-color: #f6e29b; }
        .fill-color-3 { background-color: #e4db4e; }
        .fill-color-4 { background-color: #b3be9e; }
        .fill-color-5 { background-color: #bec4dc; }
        .fill-color-6 { background-color: #ceb7cb; }

        .clear-btn {
            position: absolute;
            top: -6px; right: -6px;
            width: 16px; height: 16px;
            background: #eabb9f;
            color: #000;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px;
            cursor: pointer;
            border: 2px solid #000;
            line-height: 1;
        }
        .clear-btn:hover { background: #d79a86; }

        .keyboard-btn {
            border: 2px solid #d1d5db;
            border-radius: 0.4rem;
            background-color: #eff0ea;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.5rem 0;
            aspect-ratio: 1;
            width: 100%;
            font-size: clamp(0.85rem, 2.6vw, 1.15rem);
        }
        .keyboard-btn:hover { border-color: #4f46e5; background-color: #e6e9df; }

        /* Larger form controls */
        #blockInput, #wordLength {
            font-size: 1.05rem;
            padding: 0.75rem 0.9rem;
            background-color: #eff0ea;
        }
        /* Add-block button: plus sign with angular corners, #189973 background and black border */
        #addBlock {
            background-color: #189973;
            border: 2px solid #000;
            border-radius: 0;
            color: #ffffff;
            width: 42px;
            height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            transition: background 120ms ease, transform 120ms ease;
            padding: 0;
        }
        #addBlock:hover { background-color: #147a60; transform: translateY(-1px); }

        /* Results pane background */
        #resultsContainer { background-color: #eff0ea; }

        .block-color-0 { background-color: #fde68a; }
        .block-color-1 { background-color: #bbf7d0; }
        .block-color-2 { background-color: #bfdbfe; }
        .block-color-3 { background-color: #fbcfe8; }
        .block-color-5 { background-color: #fecaca; }
        .block-color-6 { background-color: #fef3c7; }
        .block-color-7 { background-color: #d1fae5; }
        .block-color-8 { background-color: #e9d5ff; }
        .block-span { padding: 0 0.2rem; border-radius: 0.3rem; display: inline-block; }
        .required-block { border: 2px solid #000; border-radius: 0; color: #000; padding: 0.55rem 0.55rem; font-size: 2rem; display: inline-flex; align-items: center; gap: 0.5rem; text-transform: uppercase; letter-spacing: 0.12em; font-family: 'Banana Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }

        .clear-blocks-btn { background: #e6bda1; border: 2px solid #000; color: #000; display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.15rem 0.25rem; width: 42px; overflow: hidden; white-space: nowrap; cursor: pointer; transition: width 180ms ease, background 120ms; font-size: 1.25rem; }
            .clear-blocks-btn { background: #e6bda1; border: 2px solid #000; color: #000; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.15rem 0.25rem; width: 42px; overflow: hidden; white-space: nowrap; cursor: pointer; transition: width 180ms ease, background 120ms, justify-content 120ms ease, padding-left 120ms ease; font-size: 1.25rem; }
            .clear-blocks-btn .label { display: none; margin-left: 6px; }
            .clear-blocks-btn:hover { width: 110px; justify-content: flex-start; padding-left: 8px; }
            .clear-blocks-btn:hover .label { display: inline-block; }

        /* Results should use Banana Grotesk */
        #resultsContainer, #resultsContainer * { font-family: 'Banana Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
        .result-tile { text-transform: uppercase; letter-spacing: 0.18em; font-family: 'Banana Grotesk', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; color: #000; }
        /* Make UI angular and add black borders */
        .rounded-xl, .rounded-lg, .rounded, .rounded-md, .rounded-full { border-radius: 0 !important; }
        .inner-card { border: 2px solid #000 !important; }
        #resultsContainer, .result-tile, .required-block, .block-span, input, select, button, .keyboard-btn, .clear-blocks-btn { border: 2px solid #000 !important; border-radius: 0 !important; }
        /* keep the small clear X circular */
        .clear-btn { border-radius: 50% !important; }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen p-3 sm:p-6">
    <div class="max-w-6xl mx-auto">
        <div class="rounded-xl shadow-xl p-4 sm:p-8 inner-card" style="background-color: #eff0ea;">
            <h1 class="text-2xl sm:text-4xl font-bold text-blue-700 mb-1">Gubbins Word Search Tool</h1>
            <p class="text-sm text-gray-600 mb-1">Click boxes to enter letters, or filter by required letter blocks</p>
            <p class="text-xs text-gray-500 mb-5">Dictionary: <span id="wordCount">Loading...</span> words</p>

            <!-- Word Length Selector -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Number of Letters</label>
                <select id="wordLength" class="w-full sm:w-auto px-3 py-2 text-base border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none" style="background-color: #eff0ea;">
                    <option value="2">2 Letters</option>
                    <option value="3">3 Letters</option>
                    <option value="4">4 Letters</option>
                    <option value="5">5 Letters</option>
                    <option value="6">6 Letters</option>
                    <option value="7">7 Letters</option>
                    <option value="8">8 Letters</option>
                    <option value="9" selected>9 Letters</option>
                    <option value="10">10 Letters</option>
                    <option value="11">11 Letters</option>
                    <option value="12">12 Letters</option>
                    <option value="13">13 Letters</option>
                    <option value="14">14 Letters</option>
                    <option value="15">15 Letters</option>
                </select>
            </div>

            <!-- Letter Boxes -->
            <div class="mb-6">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">Fill in the blanks</label>
                    <button id="clearAll" class="clear-blocks-btn" title="Clear all letters" style="display: none;"><span class="icon">×</span><span class="label">Clear All</span></button>
                </div>
                <div id="letterBoxes" class="mb-3"></div>

                <!-- on-screen keyboard removed; typing via physical keyboard is enabled -->
            </div>

            <!-- Required Letter Blocks -->
            <div class="mb-5 p-3" style="background-color: #eff0ea;">
                <div class="flex items-center justify-between mb-2">
                    <label class="block text-sm font-semibold text-gray-700">Required Letter Blocks <span class="font-normal text-gray-400">(optional)</span></label>
                    <button id="clearBlocksAll" class="clear-blocks-btn" title="Clear all blocks"><span class="icon">×</span><span class="label">Clear All</span></button>
                </div>
                <div class="flex gap-2 mb-3 w-full">
                    <input type="text" id="blockInput" placeholder='e.g. ail, v, able'
                           class="flex-1 min-w-0 px-3 py-2 border-2 border-gray-300 rounded-lg focus:border-indigo-500 focus:outline-none text-sm">
                    <button id="addBlock" class="shrink-0" aria-label="Add block">+</button>
                </div>
                <div id="blocksList" class="flex flex-wrap gap-2"></div>
            </div>

            <!-- Results -->
            <div class="mt-6">
                <div class="flex items-center justify-between mb-3">
                    <h2 class="text-xl sm:text-2xl font-bold text-gray-800">
                        Results
                        <span class="text-base font-normal text-gray-500 ml-1">(<span id="resultCount">0</span> <span id="resultWord">words</span>)</span>
                    </h2>
                    <div class="flex items-center gap-3">
                        <label class="text-sm text-gray-600 flex items-center gap-2">
                            <input type="checkbox" id="filterByBlocks" />
                            <span class="text-sm">Only show words with required blocks</span>
                        </label>
                    </div>
                </div>
                <div id="resultsContainer" class="text-center py-10 bg-gray-50 rounded-lg border-2 border-gray-200">
                    <p class="text-gray-400 text-sm">Click boxes above to start searching</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let wordList = [];
        const wordBuckets = Object.create(null); // length -> [words]
        let letterBoxes = [];
        let requiredBlocks = [];
        let filterByBlocks = false;
        const BLOCK_PALETTE = ['#e9bba4','#e7b465','#f6e29b','#e4db4e','#b3be9e','#bec4dc','#ceb7cb'];
        let _blockIdCounter = 0;
        let activeBox = null;
        let wordLength = 9;

        function initWordList() {
            if (typeof WORD_LIST !== 'undefined') {
                wordList = WORD_LIST;
                // build length buckets and lowercase cache for faster filtering
                for (const w of wordList) {
                    const l = w.length;
                    if (!wordBuckets[l]) wordBuckets[l] = [];
                    wordBuckets[l].push(w.toLowerCase());
                }
            } else {
                console.error('wordlist.js not loaded — WORD_LIST is undefined');
            }
            document.getElementById('wordCount').textContent = wordList.length.toLocaleString();
            // initial render should be immediate once word list available
            updateResults();
        }

        // Fast pattern matcher without RegExp allocation
        function matchesPattern(word, boxes) {
            if (word.length !== boxes.length) return false;
            for (let i = 0; i < boxes.length; i++) {
                const b = boxes[i];
                if (!b) continue;
                if (word[i] !== b.toLowerCase()) return false;
            }
            return true;
        }

        // Debounce helper to avoid heavy recalculation on rapid input
        function debounce(fn, wait) {
            let t = null;
            return function(...args) {
                clearTimeout(t);
                t = setTimeout(() => fn.apply(this, args), wait);
            };
        }

        const scheduleUpdateResults = debounce(updateResults, 100);
        function updateResultsImmediate() { updateResults(); }

        function setBoxGridColumns() {
            document.getElementById('letterBoxes').style.gridTemplateColumns = `repeat(${wordLength}, 1fr)`;
        }

        function initializeBoxes() {
            const container = document.getElementById('letterBoxes');
            container.innerHTML = '';
            letterBoxes = Array(wordLength).fill('');
            setBoxGridColumns();
            for (let i = 0; i < wordLength; i++) {
                const wrap = document.createElement('div');
                wrap.className = 'relative';
                wrap.style.minWidth = '0';
                wrap.innerHTML = `<button class="letter-box" data-index="${i}"></button>`;
                container.appendChild(wrap);
            }
            document.querySelectorAll('.letter-box').forEach((box, i) => {
                box.addEventListener('click', () => handleBoxClick(i));
            });
            activeBox = null;
            updateBoxDisplay();
            updateBoxStyles();
            updateKeyboard();
        }

        function updateResults() {
            // We'll use the prebuilt buckets and a fast per-character check

            function matchBlocksForWord(word, blocks) {
                if (!blocks || blocks.length === 0) return { placements: [], count: 0, totalLength: 0 };
                const positions = blocks.map(block => {
                    const starts = [];
                    const bl = block.length;
                    for (let i = 0; i <= word.length - bl; i++) {
                        if (word.substr(i, bl) !== block) continue;
                        let hit = false;
                        for (let k = i; k < i + bl; k++) {
                            if (letterBoxes[k] && letterBoxes[k] !== '') { hit = true; break; }
                        }
                        if (!hit) starts.push(i);
                    }
                    return starts;
                });
                if (positions.every(p => p.length === 0)) return { placements: [], count: 0, totalLength: 0 };
                const n = blocks.length;
                const order = Array.from({ length: n }, (_, i) => i)
                    .sort((a, b) => {
                        const la = blocks[a].length, lb = blocks[b].length;
                        if (lb !== la) return lb - la;
                        return positions[a].length - positions[b].length;
                    });
                let best = { placements: [], count: 0, totalLength: 0 };
                const used = [];
                function overlapsRange(s, e) {
                    for (const u of used) { if (!(e < u.start || s > u.end)) return true; }
                    return false;
                }
                function backtrack(idx, cur, curLen) {
                    if (idx === order.length) {
                        if (cur.length > best.count || (cur.length === best.count && curLen > best.totalLength))
                            best = { placements: cur.slice(), count: cur.length, totalLength: curLen };
                        return;
                    }
                    const bi = order[idx];
                    const bl = blocks[bi].length;
                    for (const s of positions[bi]) {
                        const e = s + bl - 1;
                        if (overlapsRange(s, e)) continue;
                        used.push({ start: s, end: e });
                        cur.push({ blockIndex: bi, start: s, length: bl });
                        backtrack(idx + 1, cur, curLen + bl);
                        cur.pop(); used.pop();
                    }
                    backtrack(idx + 1, cur, curLen);
                }
                backtrack(0, [], 0);
                return best;
            }

            const candidates = wordBuckets[wordLength] || [];
            const blockTexts = requiredBlocks.map(b => b.text);
            const resultsWithMeta = [];
            for (let i = 0; i < candidates.length; i++) {
                const w = candidates[i];
                if (!matchesPattern(w, letterBoxes)) continue;
                // If there are no required blocks, skip the expensive block-placement algorithm
                if (requiredBlocks.length === 0) {
                    resultsWithMeta.push({ word: w, match: { placements: [], count: 0, totalLength: 0 } });
                    continue;
                }
                const match = matchBlocksForWord(w, blockTexts);
                if (filterByBlocks && match.count === 0) continue;
                resultsWithMeta.push({ word: w, match });
            }

            resultsWithMeta.sort((a, b) => {
                if (b.match.count !== a.match.count) return b.match.count - a.match.count;
                if (b.match.totalLength !== a.match.totalLength) return b.match.totalLength - a.match.totalLength;
                return a.word.localeCompare(b.word);
            });

            const container = document.getElementById('resultsContainer');
            document.getElementById('resultCount').textContent = resultsWithMeta.length;
            document.getElementById('resultWord').textContent = resultsWithMeta.length === 1 ? 'word' : 'words';

            if (resultsWithMeta.length > 0) {
                container.className = 'grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 max-h-96 overflow-y-auto p-3 bg-gray-50 rounded-lg border-2 border-gray-200';
                const palette = ['#e9bba4','#e7b465','#f6e29b','#e4db4e','#b3be9e','#bec4dc','#ceb7cb'];
                container.innerHTML = resultsWithMeta.map(item => {
                    const w = item.word;
                        const colorMap = Array(w.length).fill(null);
                        for (const p of item.match.placements) {
                            const bi = p.blockIndex;
                            const col = (requiredBlocks[bi] && requiredBlocks[bi].color) || BLOCK_PALETTE[bi % BLOCK_PALETTE.length];
                            for (let i = p.start; i < p.start + p.length; i++) colorMap[i] = col;
                        }
                    let html = '';
                        for (let i = 0; i < w.length; i++) {
                            const col = colorMap[i];
                            if (col === null) {
                                html += `<span>${w[i]}</span>`;
                            } else {
                                const dark = darkenHex(col, 16);
                                html += `<span class="block-span" style="background-color: ${dark};">${w[i]}</span>`;
                            }
                        }
                        const color = palette[Math.floor(Math.random() * palette.length)];
                        return `<div class="px-2 py-2 border-2 border-gray-200 rounded-lg text-center font-medium hover:border-indigo-400 hover:shadow-md transition text-sm sm:text-base result-tile" style="background-color: ${color};">${html}</div>`;
                }).join('');
            } else {
                container.className = 'text-center py-10 bg-gray-50 rounded-lg border-2 border-gray-200';
                const hasInput = letterBoxes.some(b => b !== '') || requiredBlocks.length > 0;
                container.innerHTML = `<p class="text-gray-400 text-sm">${hasInput ? 'No words found matching your pattern' : 'Click boxes above to start searching'}</p>`;
            }
        }

        // on-screen keyboard removed; physical keyboard typing is supported

        function darkenHex(hex, percent) {
            hex = (hex || '').replace('#','');
            if (hex.length !== 6) return hex;
            const num = parseInt(hex,16);
            let r = (num >> 16) & 0xff;
            let g = (num >> 8) & 0xff;
            let b = num & 0xff;
            r = Math.max(0, Math.min(255, Math.round(r * (100 - percent) / 100)));
            g = Math.max(0, Math.min(255, Math.round(g * (100 - percent) / 100)));
            b = Math.max(0, Math.min(255, Math.round(b * (100 - percent) / 100)));
            return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
        }

        function handleBoxClick(index) {
            activeBox = activeBox === index ? null : index;
            updateBoxStyles();
            updateKeyboard();
        }

        function handleLetterInput(letter) {
            if (activeBox !== null) {
                letterBoxes[activeBox] = letter;
                updateBoxDisplay();
                const nextEmpty = letterBoxes.findIndex((b, i) => i > activeBox && b === '');
                activeBox = nextEmpty !== -1 ? nextEmpty : null;
                updateBoxStyles();
                updateKeyboard();
                scheduleUpdateResults();
                updateClearButton();
            }
        }

        function clearBox(index) {
            letterBoxes[index] = '';
            updateBoxDisplay();
            scheduleUpdateResults();
            updateClearButton();
        }

        function clearAllBoxes() {
            letterBoxes = Array(wordLength).fill('');
            activeBox = null;
            updateBoxDisplay();
            updateBoxStyles();
            updateKeyboard();
            scheduleUpdateResults();
            updateClearButton();
        }

        function updateBoxDisplay() {
            document.querySelectorAll('.letter-box').forEach((box, index) => {
                const parent = box.parentElement;
                const letter = letterBoxes[index];
                    box.textContent = letter;
                    if (letter) {
                        const colorIndex = index % 7;
                        box.className = `letter-box filled fill-color-${colorIndex}`;
                    } else {
                        box.className = 'letter-box';
                    }
                const existing = parent.querySelector('.clear-btn');
                if (existing) existing.remove();
                if (letter) {
                    const btn = document.createElement('button');
                    btn.className = 'clear-btn';
                    btn.innerHTML = '×';
                    btn.addEventListener('click', (e) => { e.stopPropagation(); clearBox(index); });
                    parent.appendChild(btn);
                }
            });
        }

        function updateBoxStyles() {
            document.querySelectorAll('.letter-box').forEach((box, i) => {
                box.classList.toggle('active', i === activeBox);
            });
        }

        function updateKeyboard() {
            // no visual on-screen keyboard; keep active position text updated if present
            const pos = document.getElementById('activePosition');
            if (pos) pos.textContent = activeBox !== null ? (activeBox + 1) : '';
        }

        function updateClearButton() {
            const btn = document.getElementById('clearAll');
            if (btn) btn.style.display = letterBoxes.some(b => b !== '') ? 'inline-flex' : 'none';
        }

        function addBlock() {
            const input = document.getElementById('blockInput');
            const text = input.value.trim().toLowerCase();
            if (!text) return;
            const id = 'b' + (_blockIdCounter++).toString(36) + '-' + Date.now().toString(36);
            const color = BLOCK_PALETTE[Math.floor(Math.random() * BLOCK_PALETTE.length)];
            requiredBlocks.push({ id, text, color });
            input.value = '';
            updateBlocksList();
            scheduleUpdateResults();
        }

        function removeBlock(id) {
            requiredBlocks = requiredBlocks.filter(b => b.id !== id);
            updateBlocksList();
            scheduleUpdateResults();
        }

        function updateBlocksList() {
            const container = document.getElementById('blocksList');
            container.innerHTML = '';
            requiredBlocks.forEach(block => {
                const span = document.createElement('span');
                span.className = 'required-block';
                const color = block.color || BLOCK_PALETTE[Math.floor(Math.random() * BLOCK_PALETTE.length)];
                span.style.backgroundColor = color;
                span.innerHTML = `${block.text.toUpperCase()}
                    <button class="hover:bg-indigo-200 rounded p-0.5" onclick="removeBlock('${block.id}')" aria-label="remove block">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>`;
                container.appendChild(span);
            });
            // toggle clear button visibility
            const clearBtn = document.getElementById('clearBlocksAll');
            if (clearBtn) clearBtn.style.display = requiredBlocks.length ? 'inline-flex' : 'none';
        }

        document.getElementById('wordLength').addEventListener('change', (e) => {
            wordLength = parseInt(e.target.value);
            initializeBoxes();
            scheduleUpdateResults();
            updateClearButton();
        });
        document.getElementById('addBlock').addEventListener('click', addBlock);
        document.getElementById('blockInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') addBlock(); });
        document.getElementById('clearAll').addEventListener('click', clearAllBoxes);
        document.getElementById('clearBlocksAll')?.addEventListener('click', () => { requiredBlocks = []; updateBlocksList(); scheduleUpdateResults(); });
        document.getElementById('filterByBlocks')?.addEventListener('change', (e) => { filterByBlocks = !!e.target.checked; scheduleUpdateResults(); });

        function moveActiveTo(index) {
            if (index == null) { activeBox = null; }
            else { activeBox = Math.max(0, Math.min(letterBoxes.length - 1, index)); }
            updateBoxStyles(); updateKeyboard();
        }
        function moveActive(delta) {
            if (activeBox === null) { moveActiveTo(delta > 0 ? 0 : letterBoxes.length - 1); return; }
            moveActiveTo(activeBox + delta);
        }

        document.addEventListener('keydown', (e) => {
            const ae = document.activeElement;
            if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.isContentEditable)) return;
            if (e.key && e.key.length === 1 && /^[a-zA-Z]$/.test(e.key)) {
                e.preventDefault();
                if (activeBox === null) { const ne = letterBoxes.findIndex(b => b === ''); moveActiveTo(ne !== -1 ? ne : 0); }
                handleLetterInput(e.key.toUpperCase()); return;
            }
            if (e.key === 'Backspace') {
                e.preventDefault();
                if (activeBox !== null) { clearBox(activeBox); }
                else { for (let i = letterBoxes.length - 1; i >= 0; i--) { if (letterBoxes[i]) { moveActiveTo(i); break; } } }
                return;
            }
            if (e.key === 'Delete')     { e.preventDefault(); if (activeBox !== null) clearBox(activeBox); return; }
            if (e.key === 'ArrowRight') { e.preventDefault(); moveActive(1);  return; }
            if (e.key === 'ArrowLeft')  { e.preventDefault(); moveActive(-1); return; }
            if (e.key === 'Enter') {
                e.preventDefault();
                if (activeBox !== null) { const ne = letterBoxes.findIndex((b, i) => i > activeBox && b === ''); moveActiveTo(ne !== -1 ? ne : null); }
                return;
            }
            if (e.key === 'Escape') { e.preventDefault(); moveActiveTo(null); return; }
        });

        initializeBoxes();

        // Load the (potentially large) word list asynchronously to avoid blocking initial render
        (function loadWordlistAsync(){
            const s = document.createElement('script');
            s.src = 'wordlist.js';
            s.defer = true;
            s.onload = function(){
                try { initWordList(); }
                catch(e){ console.error('initWordList error:', e); }
            };
            s.onerror = function(){ console.error('Failed to load wordlist.js'); };
            document.body.appendChild(s);
        })();

        // Lazy-load background images after idle or on load
        (function lazyLoadBackgrounds(){
            function applyImages(){
                try {
                    document.body.style.backgroundImage = "url('BG.jpg')";
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                    document.body.style.backgroundRepeat = 'no-repeat';
                    const inner = document.querySelector('.inner-card');
                    if (inner) {
                        inner.style.backgroundImage = "url('InnerBG.jpg')";
                        inner.style.backgroundSize = 'cover';
                        inner.style.backgroundPosition = 'center';
                        inner.style.backgroundRepeat = 'no-repeat';
                    }
                } catch(e){ /* ignore */ }
            }
            if ('requestIdleCallback' in window) requestIdleCallback(applyImages, {timeout:2000});
            else window.addEventListener('load', applyImages);
        })();
    </script>
</body>
</html>
